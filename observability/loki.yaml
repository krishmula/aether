# Loki config for Aether local observability stack.
#
# Single-node, filesystem storage, in-memory ring — appropriate for local dev.
# No authentication, no persistence guarantees, no replication.
# Data is stored inside the container and lost on container removal.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema v12 with tsdb is the recommended store for Loki 2.9+.
schema_config:
  configs:
    - from: "2020-10-24"
      store: tsdb
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

# Disable usage reporting — this is a local dev stack.
analytics:
  reporting_enabled: false
